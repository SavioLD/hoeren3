<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>hören³ · Online-Hörcheck</title>
<meta name="description" content="Kostenlose Online-Checks von hören³ in Trossingen: Hörgesundheits-Check & Hörfeldtherapie-Check. Anonym, ca. 2 Minuten." />
<meta name="theme-color" content="#114e49" />
<meta name="robots" content="noindex, follow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   hören³ · Akustik | Therapie | Schutz
   Landingpage + Hörcheck (Lead-Tool)  ·  Ländle Digital
   ------------------------------------------------------------
   Gemeinsames Stylesheet für:
     - index.html  (Website-Landingpage mit eingebettetem Hörcheck)
     - check.html  (schlanker Meta-Ads-Funnel, nur Hörcheck)
   Marken-Tokens aus dem hoerenhoch3.de-Auftritt (Petrol/Teal).
   ============================================================ */

:root {
  /* --- Petrol / Teal Markenpalette --- */
  --petrol-900: #0c3a37;
  --petrol-800: #114e49;   /* Topbar, Hero-Overlay */
  --petrol-700: #15605a;
  --teal-600:   #1c8a87;   /* Primär-Teal (Wortmarke) */
  --teal-500:   #239b98;   /* „Warum"-Sektion */
  --teal-400:   #36b0ac;
  --teal-300:   #7fcecb;
  --teal-100:   #e4f3f2;
  --teal-50:    #f2faf9;

  --ink:        #16302e;   /* Fließtext auf hell */
  --ink-soft:   #41605d;
  --muted:      #6f8784;
  --line:       #d9e9e7;
  --white:      #ffffff;

  /* --- Semantische Score-Farben --- */
  --good:   #1f9d6b;
  --good-bg:#e3f5ec;
  --mid:    #1c8a87;
  --mid-bg: #e0f2f1;
  --warn:   #df8a37;
  --warn-bg:#fbeede;
  --alert:  #d6604d;
  --alert-bg:#fbe7e3;
  --money:  #1f9d6b;       /* Zuschuss / positives Geld */

  --font-display: "Poppins", system-ui, -apple-system, Segoe UI, sans-serif;
  --font-body:    "Nunito Sans", system-ui, -apple-system, Segoe UI, sans-serif;

  --shadow-sm: 0 2px 10px rgba(17, 78, 73, .08);
  --shadow-md: 0 14px 40px rgba(12, 58, 55, .12);
  --shadow-lg: 0 26px 70px rgba(12, 58, 55, .20);

  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;

  --shell: 1180px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--white);
  line-height: 1.62;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
a { color: inherit; }
h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 600; line-height: 1.14; margin: 0; color: var(--ink); }
p { margin: 0 0 1em; }

.shell { width: min(100% - 40px, var(--shell)); margin-inline: auto; }
.eyebrow {
  display: inline-block; font-family: var(--font-display); font-weight: 600;
  font-size: .8rem; letter-spacing: .14em; text-transform: uppercase;
  color: var(--teal-600);
}
.section { padding: 92px 0; }
.section--tint { background: var(--teal-50); }
.section__head { max-width: 720px; margin: 0 auto 54px; text-align: center; }
.section__head h2 { font-size: clamp(1.9rem, 4vw, 2.8rem); }
.section__head p { color: var(--ink-soft); font-size: 1.08rem; margin-top: 14px; }

/* ---------- Buttons ---------- */
.btn {
  --bg: var(--petrol-800); --fg: #fff;
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-display); font-weight: 600; font-size: 1rem;
  text-decoration: none; cursor: pointer; border: 0;
  background: var(--bg); color: var(--fg);
  padding: 15px 26px; border-radius: 999px;
  transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
  box-shadow: 0 8px 22px rgba(17, 78, 73, .22);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 14px 30px rgba(17, 78, 73, .3); }
.btn:active { transform: translateY(0); }
.btn svg { width: 18px; height: 18px; }
.btn--teal  { --bg: var(--teal-600); }
.btn--white { --bg: #fff; --fg: var(--petrol-800); box-shadow: 0 8px 22px rgba(0,0,0,.16); }
.btn--ghost {
  background: transparent; color: var(--petrol-800);
  border: 1.6px solid var(--petrol-800); box-shadow: none;
}
.btn--ghost:hover { background: var(--petrol-800); color: #fff; }
.btn--ghost.on-dark { color: #fff; border-color: rgba(255,255,255,.6); }
.btn--ghost.on-dark:hover { background: #fff; color: var(--petrol-800); }
.btn--lg { padding: 17px 32px; font-size: 1.06rem; }
.btn--block { width: 100%; justify-content: center; }

/* ============================================================
   LOGO
   ============================================================ */
.logo { display: inline-flex; align-items: center; gap: 11px; text-decoration: none; color: var(--teal-600); }
.logo__mark { width: 42px; height: 42px; flex: none; }
.logo__mark .wave { fill: none; stroke: currentColor; stroke-width: 3.4; stroke-linecap: round; }
.logo__mark .ear  { fill: none; stroke: currentColor; stroke-width: 3.4; }
.logo__word { font-family: var(--font-display); font-weight: 700; font-size: 1.5rem; letter-spacing: -.01em; line-height: 1; }
.logo__word sup { font-size: .62em; top: -.55em; }
.logo__sub { display: block; font-family: var(--font-body); font-weight: 700; font-size: .52rem; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
.logo.on-dark, .logo.on-dark .logo__word { color: #fff; }
.logo.on-dark .logo__sub { color: rgba(255,255,255,.75); }

/* ============================================================
   TOPBAR (nur Website)
   ============================================================ */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--petrol-800);
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.topbar__inner { display: flex; align-items: center; justify-content: space-between; height: 76px; }
.topbar__nav { display: flex; align-items: center; gap: 28px; }
.topbar__nav a { color: rgba(255,255,255,.86); text-decoration: none; font-family: var(--font-display); font-weight: 500; font-size: .98rem; transition: color .15s; }
.topbar__nav a:hover { color: #fff; }
.topbar .btn { padding: 11px 20px; font-size: .95rem; }
.burger { display: none; width: 44px; height: 44px; background: transparent; border: 0; cursor: pointer; flex-direction: column; gap: 5px; align-items: center; justify-content: center; }
.burger span { width: 24px; height: 2.4px; background: #fff; border-radius: 2px; transition: .25s; }
.topbar__mobile { display: none; }

/* ============================================================
   HERO
   ============================================================ */
.hero {
  position: relative; color: #fff; overflow: hidden;
  background: linear-gradient(150deg, var(--petrol-800) 0%, var(--teal-600) 130%);
  padding: 86px 0 96px;
}
.hero__waves { position: absolute; inset: 0; opacity: .26; pointer-events: none; }
.hero__waves path { fill: none; stroke: #bdeeec; stroke-width: 1.4; }
.hero__inner { position: relative; display: grid; grid-template-columns: 1.05fr .95fr; gap: 54px; align-items: center; }
.hero__eyebrow { color: var(--teal-300); }
.hero h1 { color: #fff; font-size: clamp(2.3rem, 5.2vw, 3.7rem); font-weight: 700; margin: 16px 0 18px; }
.hero h1 em { font-style: normal; color: var(--teal-300); }
.hero__sub { color: rgba(255,255,255,.9); font-size: 1.16rem; max-width: 33ch; }
.hero__cta { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 30px; }
.hero__trust { list-style: none; padding: 0; margin: 34px 0 0; display: flex; flex-wrap: wrap; gap: 10px 24px; }
.hero__trust li { display: flex; align-items: center; gap: 8px; font-weight: 600; color: rgba(255,255,255,.92); font-size: .96rem; }
.hero__trust svg { width: 18px; height: 18px; color: var(--teal-300); flex: none; }

/* Hero-Teaser-Karte (Hörcheck-Anreißer) */
.hero__card {
  background: rgba(255,255,255,.97); color: var(--ink);
  border-radius: var(--radius-xl); padding: 30px;
  box-shadow: var(--shadow-lg);
}
.hero__card .tag {
  display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-display); font-weight: 600;
  font-size: .8rem; letter-spacing: .04em; color: var(--teal-600);
  background: var(--teal-100); padding: 7px 13px; border-radius: 999px;
}
.hero__card h3 { font-size: 1.5rem; margin: 16px 0 8px; }
.hero__card p { color: var(--ink-soft); font-size: 1rem; }
.hero__card .steps { list-style: none; margin: 18px 0 22px; padding: 0; display: grid; gap: 12px; }
.hero__card .steps li { display: flex; gap: 11px; align-items: flex-start; font-weight: 600; font-size: .98rem; }
.hero__card .steps .num { flex: none; width: 26px; height: 26px; border-radius: 50%; background: var(--teal-600); color: #fff; display: grid; place-items: center; font-family: var(--font-display); font-size: .85rem; }

/* ============================================================
   TRUST-STRIP
   ============================================================ */
.trustbar { background: var(--petrol-900); color: #fff; }
.trustbar__inner { display: flex; flex-wrap: wrap; justify-content: space-around; gap: 22px; padding: 26px 0; }
.trustbar__item { display: flex; align-items: center; gap: 11px; font-family: var(--font-display); font-weight: 500; }
.trustbar__item b { font-weight: 700; }
.trustbar__item svg { width: 22px; height: 22px; color: var(--teal-300); }

/* ============================================================
   LEISTUNGEN
   ============================================================ */
.cards3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.svc {
  background: #fff; border: 1px solid var(--line); border-radius: var(--radius-lg);
  padding: 32px 28px; box-shadow: var(--shadow-sm);
  transition: transform .2s ease, box-shadow .2s ease;
}
.svc:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.svc__icon { width: 56px; height: 56px; border-radius: 16px; background: var(--teal-100); color: var(--teal-600); display: grid; place-items: center; margin-bottom: 18px; }
.svc__icon svg { width: 30px; height: 30px; }
.svc h3 { font-size: 1.35rem; margin-bottom: 10px; }
.svc ul { list-style: none; margin: 14px 0 0; padding: 0; display: grid; gap: 9px; }
.svc li { position: relative; padding-left: 26px; color: var(--ink-soft); font-size: .97rem; }
.svc li::before { content: ""; position: absolute; left: 0; top: .5em; width: 13px; height: 8px; border-left: 2.4px solid var(--teal-500); border-bottom: 2.4px solid var(--teal-500); transform: rotate(-45deg); }

/* ============================================================
   WARUM hören³  (3 Spalten auf Teal)
   ============================================================ */
.warum { background: var(--teal-500); color: #fff; }
.warum .section__head h2, .warum .section__head p { color: #fff; }
.warum__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
.warum__col { background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18); border-radius: var(--radius-lg); padding: 30px 26px; }
.warum__col h3 { color: #fff; font-size: 1.55rem; font-weight: 500; text-align: center; margin-bottom: 16px; }
.warum__col p { color: rgba(255,255,255,.92); font-size: .98rem; }
.warum__col p:last-child { margin-bottom: 0; }

/* ============================================================
   PHILOSOPHIE
   ============================================================ */
.philo__inner { display: grid; grid-template-columns: .8fr 1.2fr; gap: 50px; align-items: center; }
.philo__photo { aspect-ratio: 1; border-radius: 50%; background: linear-gradient(150deg, var(--teal-400), var(--petrol-700)); display: grid; place-items: center; color: rgba(255,255,255,.9); box-shadow: var(--shadow-md); overflow: hidden; }
.philo__photo svg { width: 46%; height: 46%; opacity: .85; }
.philo__photo img { width: 100%; height: 100%; object-fit: cover; }
.philo h2 { font-size: clamp(1.8rem, 3.6vw, 2.5rem); }
.philo .lead { font-size: 1.15rem; color: var(--ink); font-weight: 600; margin: 6px 0 18px; }
.philo blockquote { margin: 22px 0 0; padding: 16px 22px; border-left: 4px solid var(--teal-500); background: var(--teal-50); border-radius: 0 var(--radius-md) var(--radius-md) 0; font-family: var(--font-display); font-style: italic; font-weight: 600; font-size: 1.2rem; color: var(--petrol-800); }

/* ============================================================
   KONTAKT
   ============================================================ */
.kontakt__inner { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
.kontakt__card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 34px; box-shadow: var(--shadow-sm); }
.kontakt__row { display: flex; gap: 14px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid var(--line); }
.kontakt__row:last-child { border-bottom: 0; }
.kontakt__row svg { width: 22px; height: 22px; color: var(--teal-600); flex: none; margin-top: 3px; }
.kontakt__row b { font-family: var(--font-display); display: block; font-size: .95rem; }
.kontakt__row a { color: var(--teal-600); text-decoration: none; font-weight: 700; }
.kontakt__map { border: 0; width: 100%; height: 100%; min-height: 280px; border-radius: var(--radius-lg); filter: saturate(.9); }

/* ============================================================
   FOOTER
   ============================================================ */
.footer { background: var(--petrol-900); color: rgba(255,255,255,.78); padding: 54px 0 30px; }
.footer__top { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 26px; align-items: flex-start; }
.footer__links { display: flex; flex-wrap: wrap; gap: 8px 24px; }
.footer__links a { color: rgba(255,255,255,.78); text-decoration: none; font-weight: 600; }
.footer__links a:hover { color: #fff; }
.footer__bottom { margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,.12); font-size: .85rem; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 10px; }
.footer__bottom a { color: var(--teal-300); }

/* ============================================================
   ===============   HÖRCHECK  (Quiz-Engine)   ===============
   Prefix h3-  ·  in jede Seite einbettbar
   ============================================================ */
.h3-app { --pad: 36px; max-width: 720px; margin-inline: auto; }
.h3-card {
  background: #fff; border: 1px solid var(--line); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-md); padding: var(--pad); position: relative; overflow: hidden;
}
.h3-app[hidden] { display: none; }
.h3-screen { animation: h3fade .35s ease both; }
@keyframes h3fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

/* --- Intro / Start --- */
.h3-intro { text-align: center; }
.h3-intro .h3-badge {
  display: inline-flex; align-items: center; gap: 8px; background: var(--teal-100); color: var(--teal-600);
  font-family: var(--font-display); font-weight: 600; font-size: .82rem; letter-spacing: .03em;
  padding: 8px 15px; border-radius: 999px; margin-bottom: 18px;
}
.h3-intro h2 { font-size: clamp(1.7rem, 4vw, 2.3rem); margin-bottom: 12px; }
.h3-intro p { color: var(--ink-soft); font-size: 1.06rem; max-width: 46ch; margin-inline: auto; }
.h3-intro__feats { list-style: none; padding: 0; margin: 24px 0 28px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 22px; }
.h3-intro__feats li { display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--ink); font-size: .95rem; }
.h3-intro__feats svg { width: 18px; height: 18px; color: var(--teal-600); }

/* --- Progress --- */
.h3-progress { margin-bottom: 26px; }
.h3-progress__meta { display: flex; justify-content: space-between; font-family: var(--font-display); font-weight: 600; font-size: .85rem; color: var(--muted); margin-bottom: 8px; }
.h3-progress__bar { height: 8px; border-radius: 999px; background: var(--teal-100); overflow: hidden; }
.h3-progress__fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--teal-500), var(--teal-600)); width: 0; transition: width .4s cubic-bezier(.4,0,.2,1); }

/* --- Question --- */
.h3-q__title { font-size: clamp(1.35rem, 3.2vw, 1.7rem); margin-bottom: 6px; }
.h3-q__help { color: var(--muted); font-size: .98rem; margin-bottom: 22px; }
.h3-options { display: grid; gap: 12px; }
.h3-opt {
  display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; cursor: pointer;
  background: #fff; border: 1.8px solid var(--line); border-radius: var(--radius-md);
  padding: 16px 18px; font-family: var(--font-body); font-size: 1.04rem; font-weight: 600; color: var(--ink);
  transition: border-color .15s, background .15s, transform .1s;
}
.h3-opt:hover { border-color: var(--teal-400); background: var(--teal-50); }
.h3-opt:active { transform: scale(.99); }
.h3-opt.is-selected { border-color: var(--teal-600); background: var(--teal-100); }
.h3-opt__dot { flex: none; width: 22px; height: 22px; border-radius: 50%; border: 2.2px solid var(--teal-300); display: grid; place-items: center; }
.h3-opt.is-selected .h3-opt__dot { border-color: var(--teal-600); background: var(--teal-600); }
.h3-opt.is-selected .h3-opt__dot::after { content: ""; width: 9px; height: 9px; border-radius: 50%; background: #fff; }

/* --- Slider (Alter) --- */
.h3-slider { margin: 8px 0 6px; }
.h3-slider__val { font-family: var(--font-display); font-weight: 700; font-size: 3rem; color: var(--teal-600); text-align: center; line-height: 1; }
.h3-slider__val small { font-size: 1rem; color: var(--muted); font-weight: 600; }
.h3-slider input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 8px; border-radius: 999px; background: var(--teal-100); margin: 26px 0 6px; }
.h3-slider input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 30px; height: 30px; border-radius: 50%; background: var(--teal-600); border: 4px solid #fff; box-shadow: var(--shadow-sm); cursor: pointer; }
.h3-slider input[type=range]::-moz-range-thumb { width: 30px; height: 30px; border: 4px solid #fff; border-radius: 50%; background: var(--teal-600); box-shadow: var(--shadow-sm); cursor: pointer; }
.h3-slider__scale { display: flex; justify-content: space-between; font-size: .82rem; color: var(--muted); font-weight: 600; }

/* --- Nav --- */
.h3-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 28px; }
.h3-back { background: transparent; border: 0; color: var(--muted); font-family: var(--font-display); font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; padding: 8px; }
.h3-back:hover { color: var(--ink); }
.h3-back[hidden] { visibility: hidden; }
.h3-nav__hint { font-size: .82rem; color: var(--muted); }

/* --- Loader --- */
.h3-loader { text-align: center; padding: 30px 0; }
.h3-loader__ring { width: 64px; height: 64px; margin: 0 auto 22px; border: 5px solid var(--teal-100); border-top-color: var(--teal-600); border-radius: 50%; animation: h3spin 1s linear infinite; }
@keyframes h3spin { to { transform: rotate(360deg); } }
.h3-loader p { font-family: var(--font-display); font-weight: 600; color: var(--ink-soft); }

/* --- Ergebnis (Score) --- */
.h3-result { text-align: center; }
.h3-gauge { width: 220px; height: 220px; margin: 6px auto 4px; position: relative; }
.h3-gauge svg { transform: rotate(-90deg); }
.h3-gauge__track { fill: none; stroke: var(--teal-100); stroke-width: 16; }
.h3-gauge__fill { fill: none; stroke-width: 16; stroke-linecap: round; transition: stroke-dashoffset 1.1s cubic-bezier(.3,.1,.2,1); }
.h3-gauge__center { position: absolute; inset: 0; display: grid; place-items: center; }
.h3-gauge__num { font-family: var(--font-display); font-weight: 700; font-size: 3.4rem; line-height: 1; }
.h3-gauge__den { display: block; font-size: 1rem; color: var(--muted); font-weight: 600; margin-top: 2px; }
.h3-cat { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; padding: 9px 18px; border-radius: 999px; margin: 6px 0 4px; }
.h3-result h2 { font-size: clamp(1.5rem, 3.4vw, 2rem); margin: 14px 0 8px; }
.h3-result__lead { color: var(--ink-soft); font-size: 1.05rem; max-width: 48ch; margin: 0 auto 6px; }

/* Stat-Reihe (Höralter etc.) */
.h3-stats { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin: 24px 0 6px; }
.h3-stat { background: var(--teal-50); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 16px 22px; min-width: 150px; }
.h3-stat__num { font-family: var(--font-display); font-weight: 700; font-size: 1.8rem; color: var(--teal-600); line-height: 1; }
.h3-stat__lbl { font-size: .85rem; color: var(--muted); font-weight: 600; margin-top: 4px; }

/* --- Gate (Lead-Formular) --- */
.h3-gate { margin-top: 26px; border-top: 1px dashed var(--line); padding-top: 26px; text-align: left; }
.h3-gate__head { display: flex; gap: 13px; align-items: flex-start; margin-bottom: 20px; }
.h3-gate__head .lock { flex: none; width: 44px; height: 44px; border-radius: 12px; background: var(--teal-100); color: var(--teal-600); display: grid; place-items: center; }
.h3-gate__head .lock svg { width: 24px; height: 24px; }
.h3-gate__head h3 { font-size: 1.3rem; }
.h3-gate__head p { color: var(--ink-soft); font-size: .97rem; margin: 4px 0 0; }
.h3-field { margin-bottom: 15px; }
.h3-field label { display: block; font-family: var(--font-display); font-weight: 600; font-size: .9rem; margin-bottom: 6px; }

      }).join("") + "</div>";
    }

    var nav =
      '<div class="h3-nav">' +
        '<button class="h3-back"' + (firstActive ? " hidden" : "") + ' id="h3-back">' + icon("back") + " Zurück</button>" +
        (q.type === "slider" ? '<button class="btn btn--teal" id="h3-next">Weiter ' + icon("arrow") + "</button>" : '<span class="h3-nav__hint">Tippen Sie zum Fortfahren</span>') +
      "</div>";

    render(head + body + nav);

    var back = $("h3-back");
    if (back) back.addEventListener("click", function () { goTo(prevActiveIndex(i)); });
    if (q.type === "slider") {
      var range = $("h3-range"), out = $("h3-slider-val");
      range.addEventListener("input", function () { out.textContent = range.value; });
      $("h3-next").addEventListener("click", function () { state.answers[q.id] = parseInt(range.value, 10); goTo(nextActiveIndex(i)); });
    } else {
      app.querySelectorAll(".h3-opt").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.answers[q.id] = parseInt(btn.getAttribute("data-idx"), 10);
          app.querySelectorAll(".h3-opt").forEach(function (b) { b.classList.remove("is-selected"); });
          btn.classList.add("is-selected");
          setTimeout(function () { goTo(nextActiveIndex(i)); }, 240);
        });
      });
    }
  }

  function goTo(i) {
    if (i < 0) { renderIntro(); return; }
    if (i >= flow().questions.length) { renderLoader(); return; }
    state.step = i; renderQuestion(i); up();
  }

  function renderLoader() {
    render('<div class="h3-loader"><div class="h3-loader__ring"></div><p>Wir werten Ihre Antworten aus …</p></div>');
    up();
    setTimeout(renderResult, 1400);
  }

  /* ---- Ergebnis (generisch) ---- */
  function renderResult() {
    var c = flow().compute(state.answers); state.computed = c;
    var C = 2 * Math.PI * 92, offset = C * (1 - c.gaugePct / 100);
    render(
      '<div class="h3-result">' +
        '<div class="h3-gauge"><svg width="220" height="220" viewBox="0 0 220 220">' +
          '<circle class="h3-gauge__track" cx="110" cy="110" r="92"></circle>' +
          '<circle class="h3-gauge__fill" cx="110" cy="110" r="92" stroke="' + c.gaugeColor + '" stroke-dasharray="' + C.toFixed(1) + '" stroke-dashoffset="' + C.toFixed(1) + '" id="h3-gauge-fill"></circle>' +
        "</svg>" +
          '<div class="h3-gauge__center"><div class="h3-gauge__num" style="color:' + c.gaugeColor + '">' + c.gaugeNum + '<span class="h3-gauge__den">' + c.gaugeDen + "</span></div></div>" +
        "</div>" +
        '<div class="h3-cat" style="color:' + c.cat.color + ";background:" + c.cat.bg + '">' + icon("pulse") + " " + c.cat.label + "</div>" +
        "<h2>" + esc(c.heading) + "</h2>" +
        '<p class="h3-result__lead">' + c.leadText + "</p>" +
        '<div class="h3-stats">' + c.stats.map(function (s) {
          return '<div class="h3-stat"><div class="h3-stat__num' + (s.small ? " h3-stat__num--text" : "") + '">' + esc(s.num) + '</div><div class="h3-stat__lbl">' + esc(s.lbl) + "</div></div>";
        }).join("") + "</div>" +
        gateHTML(c) +
      "</div>"
    );
    requestAnimationFrame(function () { setTimeout(function () { $("h3-gauge-fill").style.strokeDashoffset = offset.toFixed(1); }, 60); });
    bindGate();
    up();
    track("check_result_shown", { flow: c.flowId, value: c.gaugePct });
  }

  /* ---- Gate ---- */
  function gateHTML(c) {
    return (
      '<div class="h3-gate" id="h3-gate">' +
        '<div class="h3-gate__head"><span class="lock">' + icon("lock") + "</span><div><h3>Ihre vollständige Auswertung</h3><p>" + c.gateSub + "</p></div></div>" +
        '<div class="h3-grid2">' + field("h3-vorname", "Vorname", "text", "Vorname") + field("h3-nachname", "Nachname", "text", "Nachname") + "</div>" +
        field("h3-telefon", "Telefon", "tel", "z. B. 07425 …") +
        field("h3-email", "E-Mail", "email", "name@beispiel.de") +
        '<label class="h3-consent" id="h3-consent-wrap"><input type="checkbox" id="h3-consent"><span>Ich bin einverstanden, dass hören³ mich zu meiner Auswertung kontaktiert. Meine Daten werden vertraulich behandelt (siehe <a href="https://hoerenhoch3.de/datenschutz" target="_blank" rel="noopener">Datenschutz</a>).</span></label>' +
        '<button class="btn btn--teal btn--lg btn--block" id="h3-submit">Vollständige Auswertung anzeigen ' + icon("arrow") + "</button>" +
        '<div class="h3-trustline"><span>' + icon("check") + " Kostenlos</span><span>" + icon("check") + " Unverbindlich</span><span>" + icon("check") + " Keine Werbung an Dritte</span></div>" +
      "</div>"
    );
  }
  function field(id, label, type, ph) {
    return '<div class="h3-field" id="' + id + '-field"><label for="' + id + '">' + label + '</label><input type="' + type + '" id="' + id + '" placeholder="' + ph + '" autocomplete="' + autoc(type, id) + '"><div class="h3-field__err">Bitte ausfüllen.</div></div>';
  }
  function autoc(type, id) {
    if (type === "email") return "email";
    if (type === "tel") return "tel";
    if (id.indexOf("vorname") > -1) return "given-name";
    if (id.indexOf("nachname") > -1) return "family-name";
    return "on";
  }
  function bindGate() { $("h3-submit").addEventListener("click", submitLead); }

  function validate() {
    var ok = true;
    [{ id: "h3-vorname", t: function (v) { return v.trim().length >= 2; } },
     { id: "h3-nachname", t: function (v) { return v.trim().length >= 2; } },
     { id: "h3-telefon", t: function (v) { return v.replace(/[^\d]/g, "").length >= 6; } },
     { id: "h3-email", t: function (v) { return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v.trim()); } }
    ].forEach(function (c) { var f = $(c.id + "-field"), valid = c.t($(c.id).value); f.classList.toggle("has-error", !valid); if (!valid) ok = false; });
    var consent = $("h3-consent");
    $("h3-consent-wrap").classList.toggle("has-error", !consent.checked);
    if (!consent.checked) ok = false;
    return ok;
  }

  function submitLead() {
    if (!validate()) { app.querySelector(".has-error").scrollIntoView({ behavior: "smooth", block: "center" }); return; }
    var btn = $("h3-submit"); btn.disabled = true; btn.innerHTML = "Wird gesendet …";
    var c = state.computed, lead = buildLead(c);
    sendWeb3Forms(lead, c).then(function (sent) {
      track("check_lead_submitted", { flow: c.flowId, value: c.gaugePct, ok: sent });
      app.classList.add("is-unlocked");
      render(flow().full(lead, c, sent));
      $("h3-restart").addEventListener("click", function () { state.answers = {}; state.computed = null; app.classList.remove("is-unlocked"); (state.mode === "choose" ? renderChooser : renderIntro)(); });
      up();
    });
  }

  function buildLead(c) {
    return {
      vorname: $("h3-vorname").value.trim(), nachname: $("h3-nachname").value.trim(),
      telefon: $("h3-telefon").value.trim(), email: $("h3-email").value.trim(),
      flowId: c.flowId, flowLabel: flow().label, variant: variant, params: PARAMS, timestamp: new Date().toISOString(),
      antworten: flow().questions.filter(function (q) { return q.type === "single" && isActive(q) && state.answers[q.id] != null; }).map(function (q) { return { frage: q.title, antwort: q.options[state.answers[q.id]].label }; }),
      alter: state.answers.alter
    };
  }

  /* ---- Web3Forms ---- */
  function sendWeb3Forms(lead, c) {
    var f = flow();
    var antwortText = lead.antworten.map(function (a) { return "  • " + a.frage + " → " + a.antwort; }).join("\n");
    var paramText = Object.keys(lead.params).length ? Object.keys(lead.params).map(function (k) { return "  " + k + ": " + lead.params[k]; }).join("\n") : "  (keine)";
    var message = [
      "Neuer Lead: " + f.label, "Zeit: " + lead.timestamp,
      "Quelle: " + (lead.variant === "meta" ? "Meta-Funnel" : "Website") + " (" + lead.flowId + ")", "",
      "--- KONTAKT ---", "Name:    " + lead.vorname + " " + lead.nachname, "Telefon: " + lead.telefon, "E-Mail:  " + lead.email, "",
      f.message(lead, c), "", "--- ANTWORTEN ---", antwortText, "", "--- KAMPAGNE / TRACKING ---", paramText
    ].join("\n");

    var fd = new FormData();
    fd.append("access_key", WEB3FORMS_KEY);
    fd.append("subject", f.subjectTag + " " + lead.vorname + " " + lead.nachname + " — " + f.metric(c));
    fd.append("from_name", "hören³ · " + f.label);
    fd.append("source", (lead.variant === "meta" ? "Meta" : "Website") + " / " + lead.flowId);
    fd.append("name", lead.vorname + " " + lead.nachname);
    fd.append("email", lead.email);
    fd.append("telefon", lead.telefon);
    fd.append("tool", f.label);
    var extra = f.fields(c); Object.keys(extra).forEach(function (k) { fd.append(k, String(extra[k])); });
    fd.append("message", message);
    fd.append("payload_json", JSON.stringify({ lead: lead, ergebnis: c }));

    return fetch("https://api.web3forms.com/submit", { method: "POST", headers: { Accept: "application/json" }, body: fd })
      .then(function (r) { return r.json().catch(function () { return {}; }); })
      .then(function (j) { return !!j.success; }).catch(function () { return false; });
  }

  function reco(ic, title, text) { return "<li>" + icon(ic) + "<div><b>" + esc(title) + "</b><span>" + esc(text) + "</span></div></li>"; }

  function track(ev, data) {
    try {
      if (window.dataLayer) window.dataLayer.push(Object.assign({ event: ev }, data || {}));
      if (typeof window.fbq === "function") {
        if (ev === "check_lead_submitted") window.fbq("track", "Lead", data || {});
        else if (ev === "check_result_shown") window.fbq("trackCustom", "CheckResult", data || {});
      }
    } catch (e) { /* still */ }
  }

  /* ---- Icons ---- */
  function icon(name) {
    var I = {
      arrow: '<path d="M5 12h14M13 5l7 7-7 7"/>', back: '<path d="M19 12H5M11 19l-7-7 7-7"/>', check: '<path d="M20 6 9 17l-5-5"/>',
      clock: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>', shield: '<path d="M12 3l8 4v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V7z"/>',
      lock: '<rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>', pulse: '<path d="M3 12h4l2 7 4-16 2 9h6"/>',
      wave: '<path d="M4 9a8 8 0 0 1 0 6M9 5a14 14 0 0 1 0 14M14 8a8 8 0 0 1 0 8"/>',
      phone: '<path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2 4.2 2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.1a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.8.7A2 2 0 0 1 22 16.9z"/>',
      whatsapp: '<path d="M12 3a9 9 0 0 0-7.7 13.6L3 21l4.5-1.2A9 9 0 1 0 12 3z"/><path d="M8.5 8.5c.3-.8.6-.8 1-.8h.6c.2 0 .4 0 .6.5l.7 1.6c.1.2 0 .4-.1.6l-.4.5c-.2.2-.3.4-.1.7.5.8 1.3 1.5 2.1 1.9.3.1.5.1.7-.1l.5-.6c.2-.2.4-.2.6-.1l1.5.7c.3.1.4.3.4.5 0 .8-.6 1.5-1.3 1.6-.6.1-1.3.1-3.2-.8-2.3-1.1-3.6-3.4-3.7-3.6-.1-.2-.8-1.1-.8-2.1 0-1 .5-1.5.7-1.7z" fill="#fff" stroke="none"/>',
      euro: '<path d="M16 7a6 6 0 1 0 0 10M5 10h7M5 14h7"/>', ear: '<path d="M6 10a6 6 0 0 1 12 0c0 4-3 4-3 7a3 3 0 0 1-6 0M9 10a3 3 0 0 1 6 0"/>',
      device: '<path d="M10 4a6 6 0 0 1 6 6c0 4-3 5-3 8a3 3 0 0 1-6 0"/><circle cx="9" cy="10" r="1.5"/>',
      therapy: '<path d="M3 12h3l2 6 4-14 2 8h2a3 3 0 1 0 0-2"/>', calendar: '<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/>',
      compass: '<circle cx="12" cy="12" r="9"/><path d="M15.5 8.5l-2 5-5 2 2-5z"/>', list: '<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>',
      checkCircle: '<circle cx="12" cy="12" r="9"/><path d="M8.5 12l2.5 2.5 4.5-5"/>',
      pin: '<path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',
      info: '<circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/>'
    };
    return '<svg viewBox="0 0 24 24" width="20" height="20" ' + (name === "whatsapp" ? 'fill="currentColor"' : 'fill="none"') + ' stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + I[name] + "</svg>";
  }

  /* ============================================================ INIT ============================================================ */
  function init() {
    app = $("hoercheck-app");
    if (!app) return;
    variant = app.getAttribute("data-variant") || "web";
    var df = app.getAttribute("data-flow") || "hoercheck";
    var qp = new URLSearchParams(location.search).get("check");
    if (qp === "hoercheck" || qp === "hoerfeld" || qp === "choose") df = qp;
    if (!app.querySelector(".h3-card")) { var card = document.createElement("div"); card.className = "h3-card"; app.appendChild(card); }
    if (df === "choose") { state.mode = "choose"; renderChooser(); }
    else { state.mode = "single"; state.flowId = (df === "hoerfeld" ? "hoerfeld" : "hoercheck"); renderIntro(); }
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
})();

</script>
</body>
</html>
